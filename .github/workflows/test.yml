name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.12"]
    defaults:
      run:
        # Windows runners ship Git Bash; using shell: bash forces it everywhere,
        # which is exactly what the plugin's bash launchers run under.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Install pytest
        run: python -m pip install --quiet pytest

      # Linux runs the FULL deterministic suite below, which already includes
      # these files — only macOS/Windows need the targeted steps.
      - name: Smoke + structure + session-replay e2e (macOS/Windows)
        if: runner.os != 'Linux'
        run: python -m pytest tests/test_smoke.py tests/test_structure.py tests/test_e2e_session.py -v

      - name: Full deterministic suite incl. d-suites (Ubuntu)
        if: runner.os == 'Linux'
        run: python -m pytest tests -v -m "not live"
