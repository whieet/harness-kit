name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.12"]
    defaults:
      run:
        # Windows runners ship Git Bash; using shell: bash forces it everywhere,
        # which is exactly what the plugin's bash launchers run under.
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # tests/test_parity.py uses `git archive HEAD`

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Install pytest
        run: python -m pip install --quiet pytest

      - name: Smoke tests (cross-platform)
        run: python -m pytest tests/test_smoke.py -v

      - name: Parity tests (Unix only — needs Git Bash and old impl in HEAD)
        if: runner.os != 'Windows'
        run: python -m pytest tests/test_parity.py -v
